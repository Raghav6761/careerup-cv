[server]
headless = true
address = "0.0.0.0"
port = 5000

[client]
# Hide Streamlit's own chrome (Deploy button + dev menu) so it reads as our app, not a Streamlit app.
toolbarMode = "minimal"

[theme]
base = "light"
primaryColor = "#2b56e0"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f5f7fa"
textColor = "#022559"
font = "sans serif"
